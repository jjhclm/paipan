<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>奇门遁甲排盘</title>
<style>
:root{
  --bg:#f5f0e8;--card:#fff;--text:#4a3c2a;--muted:#8b7d6b;--accent:#a08050;
  --gan:#c0392b;--zhi:#2980b9;--star:#e67e22;--door:#27ae60;--god:#5a3c20;--cs:#8e44ad;
  --menpo:#e74c3c;--rumu:#27ae60;--jixing:#9b59b6;--both:#2980b9;--xunkong:#999;
  --wang-bg:#ffe5e5;--wang-c:#c0392b;--xiang-bg:#fff3e0;--xiang-c:#e67e22;
  --xiu-bg:#e8f5e9;--xiu-c:#27ae60;--qiu-bg:#e3f2fd;--qiu-c:#2980b9;--si-bg:#f3e5f5;--si-c:#8e44ad;
}
* { margin:0; padding:0; box-sizing:border-box; }
body { font-family:"Microsoft YaHei","PingFang SC",sans-serif; background:var(--bg); color:var(--text); min-height:100vh; }
.container { max-width:640px; margin:0 auto; padding:12px; }

.header { text-align:center; padding:14px 0; }
.header h1 { font-size:22px; color:var(--accent); letter-spacing:6px; font-weight:600; }
.header .sub { font-size:12px; color:var(--muted); margin-top:4px; }

.input-card { background:var(--card); border-radius:10px; padding:14px; margin-bottom:10px; box-shadow:0 2px 6px rgba(0,0,0,0.06); }
.input-row { display:flex; gap:8px; align-items:flex-end; flex-wrap:wrap; }
.input-group { display:flex; flex-direction:column; gap:3px; flex:1; min-width:90px; }
.input-group label { font-size:12px; color:var(--muted); font-weight:500; }
.input-group input, .input-group select { padding:7px 9px; border:1px solid #d5c8b5; border-radius:6px; background:#faf8f3; color:var(--text); font-size:14px; outline:none; }
.input-group input:focus, .input-group select:focus { border-color:var(--accent); }
.btn { padding:9px 22px; background:var(--accent); color:#fff; border:none; border-radius:6px; font-size:15px; cursor:pointer; font-weight:bold; letter-spacing:2px; transition:all .2s; }
.btn:hover { background:#8b6f47; transform:translateY(-1px); }
.btn-now { padding:7px 12px; background:#e8e0d5; color:var(--muted); border:1px solid #d5c8b5; border-radius:6px; font-size:13px; cursor:pointer; }

.sizhu-card { background:var(--card); border-radius:10px; padding:14px; margin-bottom:10px; box-shadow:0 2px 6px rgba(0,0,0,0.06); }
.sizhu-table { width:100%; border-collapse:collapse; font-size:14px; }
.sizhu-table th, .sizhu-table td { padding:5px 6px; text-align:center; border:1px solid #e8e0d5; }
.sizhu-table th { background:#faf5ed; color:var(--accent); font-weight:500; font-size:12px; }
.sizhu-table .gan { color:var(--gan); font-size:18px; font-weight:bold; }
.sizhu-table .zhi { color:var(--zhi); font-size:18px; font-weight:bold; }
.sizhu-table .label { color:var(--muted); font-size:11px; }
.lunar-info { margin-top:6px; font-size:12px; color:var(--muted); text-align:center; }

.info-row { display:flex; flex-wrap:wrap; gap:6px; margin-bottom:10px; }
.info-tag { background:var(--card); border-radius:8px; padding:7px 10px; box-shadow:0 2px 6px rgba(0,0,0,0.06); font-size:12px; line-height:1.3; }
.info-tag .label { color:var(--muted); font-size:11px; }
.info-tag .value { color:var(--text); font-weight:600; font-size:13px; }
.info-tag .fuyin { color:var(--gan); font-weight:bold; }
.info-tag .si-hai { display:inline-block; width:14px; height:14px; border-radius:50%; text-align:center; line-height:14px; font-size:10px; color:#fff; margin-left:2px; }
.info-tag .si-hai.menpo { background:var(--menpo); }
.info-tag .si-hai.rumu { background:var(--rumu); }
.info-tag .si-hai.jixing { background:var(--jixing); }
.info-tag .si-hai.both { background:var(--both); }

.collapse-btn { background:var(--card); border-radius:8px; padding:9px 14px; box-shadow:0 2px 6px rgba(0,0,0,0.06); cursor:pointer; display:flex; justify-content:space-between; align-items:center; font-size:13px; color:var(--muted); margin-bottom:10px; user-select:none; }
.collapse-btn::after { content:"▼"; font-size:10px; transition:transform .3s; }
.collapse-btn.open::after { transform:rotate(180deg); }
.collapse-content { display:none; background:var(--card); border-radius:8px; padding:12px; margin-bottom:10px; box-shadow:0 2px 6px rgba(0,0,0,0.06); font-size:13px; line-height:1.8; }
.collapse-content.open { display:block; }

.legend { display:flex; gap:12px; justify-content:center; flex-wrap:wrap; margin:8px 0; font-size:11px; color:var(--muted); }
.legend-item { display:flex; align-items:center; gap:3px; }

.grid-container { display:grid; grid-template-columns:repeat(3,1fr); gap:4px; max-width:100%; margin:10px auto; }
.cell { background:var(--card); border-radius:8px; border:1px solid #e0d5c5; display:flex; flex-direction:column; align-items:stretch; position:relative; transition:all .2s; min-height:110px; overflow:hidden; }
.cell:hover { border-color:var(--accent); box-shadow:0 2px 8px rgba(160,128,80,0.15); }
.cell.highlight { border-color:var(--gan); border-width:2px; box-shadow:0 0 10px rgba(192,57,43,0.2); }
.cell.gan-fuyin { background:#fff8f0; }
.cell.xing-fuyin { background:#f0f8ff; }
.cell.men-fuyin { background:#f0fff0; }

.cell-god { text-align:center; font-size:14px; font-weight:bold; color:var(--god); padding:3px 2px 0; position:relative; }
.cell-god .god-name { font-size:15px; }
.cell-god .god-state { font-size:10px; color:var(--muted); margin-left:2px; }
.cell-god .m-star { font-size:16px; color:var(--star); position:absolute; right:4px; top:2px; }
.cell-god .xunkong-mark { font-size:12px; color:var(--xunkong); margin-left:3px; }
.cell-god .si-badge { display:inline-block; font-size:9px; padding:1px 4px; border-radius:3px; color:#fff; margin-left:3px; line-height:1.2; }
.cell-god .si-badge.menpo { background:var(--menpo); }
.cell-god .si-badge.rumu { background:var(--rumu); }
.cell-god .si-badge.jixing { background:var(--jixing); }
.cell-god .si-badge.both { background:var(--both); }

.cell-content { display:flex; flex-direction:row; align-items:center; justify-content:space-between; padding:2px 5px; flex:1; }
.cell-left { display:flex; flex-direction:column; align-items:flex-start; gap:1px; }
.cell-right { display:flex; flex-direction:column; align-items:flex-end; gap:1px; }

.cell-tiangan { font-size:20px; font-weight:bold; color:var(--gan); line-height:1.1; }
.cell-star { font-size:11px; color:var(--star); }
.cell-door { font-size:12px; color:var(--door); font-weight:500; }
.cell-diangan { font-size:13px; color:var(--zhi); }
.cell-num { font-size:11px; color:var(--muted); font-weight:bold; position:absolute; bottom:2px; left:4px; }
.cell-changsheng { font-size:10px; color:var(--cs); }
.cell-wangshuai { font-size:10px; padding:1px 3px; border-radius:3px; display:inline-block; margin-top:1px; }
.wang { background:var(--wang-bg); color:var(--wang-c); }
.xiang { background:var(--xiang-bg); color:var(--xiang-c); }
.xiu { background:var(--xiu-bg); color:var(--xiu-c); }
.qiu { background:var(--qiu-bg); color:var(--qiu-c); }
.si { background:var(--si-bg); color:var(--si-c); }
.cell-rumu { font-size:9px; color:var(--rumu); font-weight:bold; }
.cell-jixing { font-size:9px; color:var(--jixing); font-weight:bold; }
.cell-menpo { font-size:9px; color:var(--menpo); font-weight:bold; }

.cell .gong-watermark { position:absolute; font-size:55px; color:rgba(160,128,80,0.06); font-weight:bold; top:50%; left:50%; transform:translate(-50%,-50%); pointer-events:none; z-index:0; }

.cell.zhong { background:#faf5ed; justify-content:center; align-items:center; min-height:60px; }
.cell.zhong .cell-num { position:static; text-align:center; font-size:16px; color:var(--accent); margin-bottom:3px; }
.cell.zhong .zhong-label { font-size:12px; color:var(--muted); }

/* 占断面板 */
.reading-card { background:var(--card); border-radius:10px; padding:14px; margin-top:10px; box-shadow:0 2px 6px rgba(0,0,0,0.06); font-size:13px; line-height:1.8; }
.reading-card h3 { color:var(--accent); margin-bottom:8px; font-size:15px; border-bottom:1px solid #e8e0d5; padding-bottom:6px; }
.reading-card .alert { color:var(--gan); font-weight:600; }
.reading-card .warning { color:var(--star); font-weight:600; }
.reading-card .good { color:var(--door); font-weight:600; }
.reading-card .si-list { display:flex; flex-wrap:wrap; gap:4px; margin:4px 0; }
.reading-card .si-tag { font-size:11px; padding:2px 6px; border-radius:4px; color:#fff; }
.reading-card .si-tag.menpo { background:var(--menpo); }
.reading-card .si-tag.rumu { background:var(--rumu); }
.reading-card .si-tag.jixing { background:var(--jixing); }
.reading-card .si-tag.both { background:var(--both); }
.reading-card .si-tag.xunkong { background:var(--xunkong); }
.reading-card .si-tag.fuyin { background:var(--gan); }

.detail-card { background:var(--card); border-radius:10px; padding:14px; margin-top:10px; box-shadow:0 2px 6px rgba(0,0,0,0.06); font-size:12px; line-height:1.8; color:var(--muted); }
.detail-card h3 { color:var(--accent); margin-bottom:8px; font-size:15px; border-bottom:1px solid #e8e0d5; padding-bottom:6px; }

@media (max-width:480px) {
  .container { padding:8px; }
  .cell { min-height:95px; }
  .cell-tiangan { font-size:17px; }
  .cell-god { font-size:12px; }
  .cell-star, .cell-door { font-size:10px; }
  .input-row { flex-direction:column; }
  .input-group { width:100%; }
}
/* PWA 安装条 */
.pwa-bar { display:flex; align-items:center; justify-content:space-between; background:var(--card); border-radius:10px; padding:10px 14px; margin-top:10px; box-shadow:0 2px 6px rgba(0,0,0,0.06); gap:10px; }
.pwa-bar span { font-size:13px; color:var(--text); flex:1; }
.pwa-bar .btn-install { padding:6px 14px; background:var(--accent); color:#fff; border:none; border-radius:6px; font-size:13px; cursor:pointer; font-weight:600; letter-spacing:1px; }
.pwa-bar .btn-install:hover { background:#8b6f47; }

/* Obsidian 导出 */
.obsidian-card { background:var(--card); border-radius:10px; padding:14px; margin-top:10px; box-shadow:0 2px 6px rgba(0,0,0,0.06); }
.obsidian-card h3 { color:var(--accent); margin-bottom:10px; font-size:15px; border-bottom:1px solid #e8e0d5; padding-bottom:6px; }
.obsidian-btns { display:flex; gap:8px; flex-wrap:wrap; }
.btn-obs { padding:7px 14px; background:#e8e0d5; color:var(--text); border:1px solid #d5c8b5; border-radius:6px; font-size:13px; cursor:pointer; font-weight:500; transition:all .2s; }
.btn-obs:hover { background:var(--accent); color:#fff; border-color:var(--accent); }
</style>

<body>
<div class="container">
  <div class="header">
    <h1>奇门遁甲排盘</h1>
    <p class="sub">时家转盘奇门 · 拆补法</p>
  </div>

  <div class="input-card">
    <div class="input-row">
      <div class="input-group">
        <label>公历日期</label>
        <input type="date" id="dateInput">
      </div>
      <div class="input-group">
        <label>时间</label>
        <input type="time" id="timeInput" step="60">
      </div>
      <div class="input-group">
        <label>时区</label>
        <select id="tzSelect"><option value="8">北京时间 UTC+8</option></select>
      </div>
      <button class="btn" onclick="doPaiPan()">排 盘</button>
      <button class="btn-now" onclick="setNow()">现在</button>
    </div>
  </div>

  <div class="sizhu-card" id="sizhuCard"></div>
  <div class="info-row" id="infoRow"></div>

  <div class="collapse-btn" id="jieQiBtn" onclick="toggleJieQi()">点击显示节气</div>
  <div class="collapse-content" id="jieQiContent"></div>

  <div class="legend">
    <div class="legend-item"><span style="color:var(--gan)">●</span>天盘</div>
    <div class="legend-item"><span style="color:var(--zhi)">●</span>地盘</div>
    <div class="legend-item"><span style="color:var(--star)">●</span>九星</div>
    <div class="legend-item"><span style="color:var(--door)">●</span>八门</div>
    <div class="legend-item"><span style="color:var(--god)">●</span>八神</div>
    <div class="legend-item"><span style="color:var(--cs)">●</span>长生</div>
  </div>

  <div class="grid-container" id="gridContainer"></div>

  <div class="reading-card" id="readingCard"></div>
  <div class="detail-card" id="detailCard"></div>

  <div class="obsidian-card" id="obsidianCard">
    <h3>保存到 Obsidian</h3>
    <div class="obsidian-btns">
      <button class="btn-obs" onclick="saveObsidian('download')">下载 .md 文件</button>
      <button class="btn-obs" onclick="saveObsidian('image')">导出图片</button>
      <button class="btn-obs" onclick="saveObsidian('uri')">用 Obsidian 打开</button>
      <button class="btn-obs" onclick="saveObsidian('clipboard')">复制 Markdown</button>
    </div>
  </div>

  <div class="pwa-bar" id="pwaBar">
    <span>安装到手机桌面，离线也能排盘</span>
    <button class="btn-install" id="btnInstall" onclick="installPWA()">安装</button>
  </div>
</div>

// ========== 性能优化：缓存对象池 ==========
const CACHE = new Map();
function cacheKey(prefix, ...args) { return prefix + ':' + args.join(','); }

// ========== 基础算法 ==========
function daysBetween(d1,d2) {

}

  if (CACHE.has(key)) return CACHE.get(key);
  const offset = daysBetween(BASE_DATE, date);
  const gz = gzFromDayOffset(offset);
  const result = {ganIdx: gz[0]-1, zhiIdx: gz[1]-1};
  CACHE.set(key, result);
  return result;
}
function yearGanZhi(date) {

  const g = (year-4)%10, z = (year-4)%12;

}

function getChangSheng(ganIdx, zhiIdx) {

// ========== 排盘核心 ==========
function getQiyiGong(juShu, isYang, qiyiIdx) {
  const gongSeq = [1,2,3,4,5,6,7,8,9];

}

}

}

  let zhiFuDiGong = null;

  const zfDiG = resolveGong(zhiFuDiGong), zfG = resolveGong(zhiFuGong);
  const offset = (zfG - zfDiG + 9) % 9;
  const tianpan = {};
  for (let g=1;g<=9;g++) {

    tianpan[g] = diPan[srcG];

function paiXing(zhiFuGong, isYang) {

// ========== 四害检测 ==========
function checkMenPo(door, gong) {
  // 门克宫为门迫
  const doorWx = DOOR_WX[door], gongWx = GONG_WX[gong];
  if (doorWx === undefined || gongWx === undefined) return false;
  const ke = [3,4,0,1,2]; // 木克土 土克水 水克火 火克金 金克木
  return ke[doorWx] === gongWx;
}
function checkRuMu(gan, gong) {
  // 天干入墓
  const gongIdx = RUMU_GONG[gan];
  return gongIdx === gong;
}
function checkJiXing(gan, gong) {
  // 天干击刑
  const gongIdx = JIXING_GONG[gan];
  return gongIdx === gong;
}
function checkMaXing(shiZhiIdx) {
  // 马星宫位
  return MAXING_GONG[shiZhiIdx];
}

// ========== 伏吟判断 ==========
function checkFuYin(tianPan, diPan, xingMap, menMap) {
  const result = { gan: [], xing: [], men: [] };
  // 干伏吟：天盘干=地盘干
  for (let g=1; g<=9; g++) {
    if (g===5) continue;
    if (tianPan[g] === diPan[g]) result.gan.push(g);
  }
  // 星伏吟：九星回归原始宫位
  for (let g=1; g<=9; g++) {
    if (g===5) continue;
    const idx = STAR_GONG.indexOf(g);
    if (idx >= 0 && xingMap[g] === STAR_SEQ[idx]) result.xing.push(g);
  }
  // 门伏吟：八门保持初始宫位
  for (let g=1; g<=9; g++) {
    if (g===5) continue;
    if (menMap[g] === DOOR_ORIGIN[g]) result.men.push(g);
  }
  return result;
}

// ========== 农历 ==========
function lunarYearDays(y) { let i=0x8000,sum=348; for(let j=0;j<12;j++){sum+=(LUNAR_INFO[y-1900]&i)?1:0;i>>=1;} return sum+leapDays(y); }
function leapDays(y) { if(leapMonth(y)) return (LUNAR_INFO[y-1900]&0x10000)?30:29; return 0; }

function monthDays(y,m) { return (LUNAR_INFO[y-1900]&(0x10000>>m))?30:29; }

function toLunar(date) {
  let y=date.getFullYear(),m=date.getMonth()+1,d=date.getDate();
  let base=new Date(1900,0,31), offset=Math.floor((date-base)/86400000);
  let i,leap=0,temp=0;
  for(i=1900;i<2100&&offset>0;i++){temp=lunarYearDays(i);offset-=temp;}
  if(offset<0){offset+=temp;i--;}
  let year=i; leap=leapMonth(i);
  let isLeap=false;
  for(i=1;i<13&&offset>0;i++){
    if(leap>0&&i==leap+1&&!isLeap){i--;isLeap=true;temp=leapDays(year);}
    else{temp=monthDays(year,i);}
    if(isLeap&&i==leap+1)isLeap=false;
    offset-=temp;
  }
  if(offset==0&&leap>0&&i==leap+1){if(isLeap)isLeap=false;else{isLeap=true;i--;}}
  if(offset<0){offset+=temp;i--;}
  let month=i,day=offset+1;
  return {year,month,day,isLeap,
    monthStr:(isLeap?'闰':'')+LUNAR_MONTH[month-1]+'月',
    dayStr:LUNAR_DAY[day-1],
    ganZhi:getYearGanZhi(year)};
}

function buildCellHTML(g, diPan, tianPan, xingMap, menMap, shenMap, zhiFuGong, menResult, xunShou, yueZhiIdx, shiZhiIdx, siHai) {

  const isZhiShi = g === menResult.zhiShiGong;
  const isMaXing = g === checkMaXing(shiZhiIdx);

function doPaiPan() {

  const timeStr = document.getElementById('timeInput').value;

    const [h,m] = timeStr.split(':'); hour=parseInt(h); minute=parseInt(m);
    date = new Date(dateStr+'T'+timeStr);
  } else { date = new Date(dateStr); }

  // 1. 四柱
  const yGZ = yearGanZhi(date);
  const mGZ = monthGanZhi(date);
  const dGZ = dayGanZhi(date);
  const hGZ = hourGanZhi(date, dGZ.ganIdx+1);
  const yearStr=fmtGZ(yGZ.ganIdx,yGZ.zhiIdx), monthStr=fmtGZ(mGZ.ganIdx,mGZ.zhiIdx);
  const dayStr=fmtGZ(dGZ.ganIdx,dGZ.zhiIdx), hourStr=fmtGZ(hGZ.ganIdx,hGZ.zhiIdx);

  // 2. 节气与用局
  const jieQi = getJieQi(date);
  const isYang = jieQi.yang;
  const sanYuan = getSanYuan(dGZ);
  const juShu = getJuShu(jieQi, dGZ);
  const dunStr = isYang ? '阳遁' : '阴遁';

  // 3. 地盘
  const diPan = paiDiPan(juShu, isYang);

  // 4. 旬首 & 值符
  const xunShou = getXunShou(hGZ.ganIdx, hGZ.zhiIdx);
  const zhiFuGong = findZhiFuZhiShi(diPan, xunShou);

  // 5. 天盘
  const tianPan = paiTianPan(diPan, zhiFuGong, xunShou.yi, isYang);

  // 6. 九星
  const xingResult = paiXing(zhiFuGong, isYang);
  const xingMap = xingResult.map;

  // 7. 八门
  const menResult = paiMen(juShu, isYang, xunShou, hGZ, diPan);
  const menMap = menResult.map;

  // 8. 八神
  const shenMap = paiShen(zhiFuGong, isYang);

  // 9. 农历
  const lunar = toLunar(date);
  const yueZhiIdx = getZhiMonth(date);
  const xunKongZhi = getXunKongZhi(xunShou.zhiStart);

  // 10. 四害检测
  const siHai = {};
  for (let g=1; g<=9; g++) {
    if (g===5) continue;
    siHai[g] = {};
    const tianGan = tianPan[g];
    const diGan = diPan[g];
    const door = menMap[g];

    // 门迫
    if (door && checkMenPo(door, g)) siHai[g].menpo = true;

    // 入墓
    if (tianGan && checkRuMu(tianGan, g)) siHai[g].rumuTian = true;
    if (diGan && checkRuMu(diGan, g)) siHai[g].rumuDi = true;
    if (siHai[g].rumuTian || siHai[g].rumuDi) siHai[g].rumu = true;

    // 击刑
    if (tianGan && checkJiXing(tianGan, g)) siHai[g].jixingTian = true;
    if (diGan && checkJiXing(diGan, g)) siHai[g].jixingDi = true;
    if (siHai[g].jixingTian || siHai[g].jixingDi) siHai[g].jixing = true;

    // 入墓+击刑同时出现
    if (siHai[g].rumu && siHai[g].jixing) { siHai[g].both = true; siHai[g].rumu=false; siHai[g].jixing=false; }
  }

  // 11. 伏吟判断
  const fuYin = checkFuYin(tianPan, diPan, xingMap, menMap);
  for (let g of fuYin.gan) { if (!siHai[g]) siHai[g]={}; siHai[g].ganFuyin=true; }
  for (let g of fuYin.xing) { if (!siHai[g]) siHai[g]={}; siHai[g].xingFuyin=true; }
  for (let g of fuYin.men) { if (!siHai[g]) siHai[g]={}; siHai[g].menFuyin=true; }
  const isFuYin = fuYin.gan.length > 0 || fuYin.xing.length > 0 || fuYin.men.length > 0;

  // 12. 马星
  const maXingGong = checkMaXing(hGZ.zhiIdx);

  // === 渲染：使用innerHTML批量更新（比多次appendChild快）===
  // 四柱表格
  const sizhuHTML = `
    <table class="sizhu-table">
      <tr><th></th><th>年</th><th>月</th><th>日</th><th>时</th></tr>
      <tr><td class="label">天干</td>
        <td class="gan">${TIAN_GAN[yGZ.ganIdx]}</td>
        <td class="gan">${TIAN_GAN[mGZ.ganIdx]}</td>
        <td class="gan">${TIAN_GAN[dGZ.ganIdx]}</td>
        <td class="gan">${TIAN_GAN[hGZ.ganIdx]}</td>
      </tr>
      <tr><td class="label">地支</td>
        <td class="zhi">${DI_ZHI[yGZ.zhiIdx]}</td>
        <td class="zhi">${DI_ZHI[mGZ.zhiIdx]}</td>
        <td class="zhi">${DI_ZHI[dGZ.zhiIdx]}</td>
        <td class="zhi">${DI_ZHI[hGZ.zhiIdx]}</td>
      </tr>
    </table>
    <div class="lunar-info">
      阳历 ${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日 ${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')} |
      阴历 ${lunar.ganZhi}年 ${lunar.monthStr}${lunar.dayStr}
    </div>`;
  document.getElementById('sizhuCard').innerHTML = sizhuHTML;

  // 信息行
  let infoHTML = '';
  infoHTML += `<div class="info-tag"><div class="label">选局</div><div class="value">${dunStr}${juShu}局</div></div>`;
  infoHTML += `<div class="info-tag"><div class="label">旬首</div><div class="value">甲${DI_ZHI[xunShou.zhiStart]}${xunShou.yi}</div></div>`;
  infoHTML += `<div class="info-tag"><div class="label">值符</div><div class="value">${xingResult.zhiFuStar}</div></div>`;
  infoHTML += `<div class="info-tag"><div class="label">值使</div><div class="value">${menResult.zhiShiMen}门</div></div>`;
  infoHTML += `<div class="info-tag"><div class="label">旬空</div><div class="value">${xunKongZhi}</div></div>`;
  infoHTML += `<div class="info-tag"><div class="label">马星</div><div class="value">${DI_ZHI[hGZ.zhiIdx]}马在${maXingGong}宫</div></div>`;
  if (isFuYin) {
    infoHTML += `<div class="info-tag"><div class="label">格局</div><div class="value fuyin">${fuYin.gan.length?'干伏吟 ':''}${fuYin.xing.length?'星伏吟 ':''}${fuYin.men.length?'门伏吟':''}</div></div>`;
  }
  infoHTML += `<div class="info-tag"><div class="label">局式</div><div class="value">转盘-拆补-寄坤二宫</div></div>`;
  document.getElementById('infoRow').innerHTML = infoHTML;

  // 节气详情
  const nextJieQiIdx = (JIE_QI.indexOf(jieQi) + 1) % JIE_QI.length;
  const nextJieQi = JIE_QI[nextJieQiIdx];
  document.getElementById('jieQiContent').innerHTML = `
    <div><strong>当前节气：</strong>${jieQi.name}（${jieQi.yang?'阳遁':'阴遁'}${jieQi.ju}局）</div>
    <div><strong>下一个节气：</strong>${nextJieQi.name}（${nextJieQi.month}月${nextJieQi.day}日）</div>
    <div><strong>三元：</strong>${sanYuan}</div>
    <div><strong>月令：</strong>${DI_ZHI[yueZhiIdx]}月（${WUXING_NAME[(yueZhiIdx>=2&&yueZhiIdx<=3)?0:(yueZhiIdx>=4&&yueZhiIdx<=5)?1:(yueZhiIdx>=6&&yueZhiIdx<=7)?2:(yueZhiIdx>=8&&yueZhiIdx<=9)?3:4]}当令）</div>
  `;

  // 九宫格（拼接字符串一次性更新）
  let gridHTML = '';
  for (let g of GONG_ORDER) {
    gridHTML += buildCellHTML(g, diPan, tianPan, xingMap, menMap, shenMap, zhiFuGong, menResult, xunShou, yueZhiIdx, hGZ.zhiIdx, siHai);
  }
  document.getElementById('gridContainer').innerHTML = gridHTML;

  // 占断面板
  let readingHTML = `<h3>占断摘要</h3>`;
  if (isFuYin) {
    readingHTML += `<div class="alert">⚠️ 伏吟局：天盘地盘${fuYin.gan.length?'干伏吟':''}${fuYin.xing.length?'星伏吟':''}${fuYin.men.length?'门伏吟':''} — 主迟滞，利静不利动</div>`;
  }

  // 收集四害
  let siHaiList = [];
  for (let g=1; g<=9; g++) {
    if (g===5) continue;
    const s = siHai[g];
    if (!s) continue;
    let badges = '';
    if (s.both) badges += '<span class="si-tag both">入墓+击刑</span>';
    else {
      if (s.rumu) badges += '<span class="si-tag rumu">入墓</span>';
      if (s.jixing) badges += '<span class="si-tag jixing">击刑</span>';
    }
    if (s.menpo) badges += '<span class="si-tag menpo">门迫</span>';
    if (getXunKong(g, xunShou.zhiStart)) badges += '<span class="si-tag xunkong">空亡</span>';
    if (s.ganFuyin) badges += '<span class="si-tag fuyin">干伏吟</span>';
    if (s.xingFuyin) badges += '<span class="si-tag fuyin">星伏吟</span>';
    if (s.menFuyin) badges += '<span class="si-tag fuyin">门伏吟</span>';
    if (badges) siHaiList.push(`<div>${g}宫：${badges}</div>`);
  }
  if (siHaiList.length > 0) {
    readingHTML += `<div style="margin-top:8px;"><strong>四害与格局：</strong></div>`;
    readingHTML += `<div class="si-list">${siHaiList.join('')}</div>`;
  } else {
    readingHTML += `<div class="good">✓ 本局无明显四害，格局较清</div>`;
  }

  // 马星提示
  if (maXingGong) {
    readingHTML += `<div style="margin-top:8px;"><strong>马星：</strong>在${maXingGong}宫，主奔波、变动、远行</div>`;
  }

  document.getElementById('readingCard').innerHTML = readingHTML;

  // 详情
  document.getElementById('detailCard').innerHTML = `
    <h3>排盘详情</h3>
    <div><strong>公历：</strong>${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日 ${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}</div>
    <div><strong>农历：</strong>${lunar.ganZhi}年 ${lunar.monthStr}${lunar.dayStr}</div>
    <div><strong>四柱：</strong>${yearStr} ${monthStr} ${dayStr} ${hourStr}</div>
    <div><strong>节气：</strong>${jieQi.name}（${jieQi.yang?'阳遁':'阴遁'}）</div>
    <div><strong>用局：</strong>${dunStr}${juShu}局 · ${sanYuan}</div>
    <div><strong>旬首：</strong>甲${DI_ZHI[xunShou.zhiStart]}（${xunShou.yi}）</div>
    <div><strong>旬空：</strong>${xunKongZhi}</div>
    <div><strong>值符：</strong>${xingResult.zhiFuStar}（落${zhiFuGong}宫）</div>
    <div><strong>值使：</strong>${menResult.zhiShiMen}门（落${menResult.zhiShiGong}宫，动${menResult.shiChenShu}时）</div>
    <div><strong>马星：</strong>${DI_ZHI[hGZ.zhiIdx]}马在${maXingGong}宫</div>
    ${isFuYin ? `<div><strong>伏吟：</strong>${fuYin.gan.length?'干伏吟('+fuYin.gan.join(',')+'宫) ':''}${fuYin.xing.length?'星伏吟('+fuYin.xing.join(',')+'宫) ':''}${fuYin.men.length?'门伏吟('+fuYin.men.join(',')+'宫)':''}</div>` : ''}
    <div style="margin-top:10px;font-size:11px;color:var(--muted);">
      <p>【排盘步骤】</p>
      <p>1. 四柱：${yearStr} ${monthStr} ${dayStr} ${hourStr}</p>
      <p>2. 节气${jieQi.name}，日支${DI_ZHI[dGZ.zhiIdx]}属${sanYuan}，得${dunStr}${juShu}局</p>
      <p>3. 地盘戊起${juShu}宫${isYang?'顺':'逆'}排三奇六仪</p>
      <p>4. 时柱${hourStr}，旬首甲${DI_ZHI[xunShou.zhiStart]}（${xunShou.yi}），值符落${zhiFuGong}宫</p>
      <p>5. 天盘随值符转动，八门值使随时辰推演，九星八神依次排布</p>
    </div>
    <div style="margin-top:10px;font-size:11px;color:#999;text-align:center;">排盘内容仅供娱乐，请客观科学看待，抵制封建迷信</div>
  `;

  const t1 = performance.now();
  console.log(`排盘耗时: ${(t1-t0).toFixed(1)}ms`);

  // 保存到全局供导出使用
  window._panData = { date, hour, minute, yearStr, monthStr, dayStr, hourStr, lunar, jieQi, isYang, dunStr, juShu, sanYuan, xunShou, xunKongZhi, zhiFuGong, maXingGong, isFuYin, fuYin, siHai, diPan, tianPan, xingMap, menMap, shenMap, yueZhiIdx, hGZ };
}

// ========== Obsidian 导出 ==========
function generateMarkdown() {
  const d = window._panData;
  if (!d) return '请先排盘后再导出';
  const { date, hour, minute, yearStr, monthStr, dayStr, hourStr, lunar, jieQi, isYang, dunStr, juShu, sanYuan, xunShou, xunKongZhi, zhiFuGong, maXingGong, isFuYin, fuYin, siHai, diPan, tianPan, xingMap, menMap, shenMap, yueZhiIdx, hGZ } = d;
  const dateFmt = `${date.getFullYear()}-${String(date.getMonth()+1).padStart(2,'0')}-${String(date.getDate()).padStart(2,'0')}`;
  const timeFmt = `${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}`;

  let md = `# 奇门遁甲排盘 ${dateFmt} ${timeFmt}\n\n`;
  md += `## 九宫格图片\n\n`;
  md += `![九宫格](奇门排盘-${dateFmt}.png)\n\n`;
  md += `## 基本信息\n\n`;
  md += `- **公历**：${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日 ${timeFmt}\n`;
  md += `- **农历**：${lunar.ganZhi}年 ${lunar.monthStr}${lunar.dayStr}\n`;
  md += `- **四柱**：${yearStr} ${monthStr} ${dayStr} ${hourStr}\n`;
  md += `- **节气**：${jieQi.name}（${isYang?'阳遁':'阴遁'}${jieQi.ju}局）\n`;
  md += `- **用局**：${dunStr}${juShu}局 · ${sanYuan}\n`;
  md += `- **旬首**：甲${DI_ZHI[xunShou.zhiStart]}（${xunShou.yi}）\n`;
  md += `- **旬空**：${xunKongZhi}\n`;
  md += `- **值符**：${xingMap[zhiFuGong]||''}（落${zhiFuGong}宫）\n`;
  md += `- **值使**：${menMap[zhiFuGong]||''}门（落${zhiFuGong}宫）\n`;
  md += `- **马星**：${DI_ZHI[hGZ.zhiIdx]}马在${maXingGong}宫\n`;
  if (isFuYin) {
    md += `- **伏吟**：${fuYin.gan.length?'干伏吟('+fuYin.gan.join(',')+'宫) ':''}${fuYin.xing.length?'星伏吟('+fuYin.xing.join(',')+'宫) ':''}${fuYin.men.length?'门伏吟('+fuYin.men.join(',')+'宫)':''}\n`;
  }
  md += `\n`;

  md += `## 九宫格\n\n`;
  md += `| 宫 | 八神 | 天盘 | 九星 | 八门 | 地盘 | 状态 |\n`;
  md += `|---|------|------|------|------|------|------|\n`;
  for (let g of GONG_ORDER) {
    if (g === 5) {
      md += `| 5 | — | — | — | — | ${diPan[5]||'戊'}寄坤 | — |\n`;
      continue;
    }
    const s = siHai[g] || {};
    let status = [];
    if (s.both) status.push('入墓+击刑');
    else { if (s.rumu) status.push('入墓'); if (s.jixing) status.push('击刑'); }
    if (s.menpo) status.push('门迫');
    if (getXunKong(g, xunShou.zhiStart)) status.push('空亡');
    if (s.ganFuyin) status.push('干伏吟');
    if (s.xingFuyin) status.push('星伏吟');
    if (s.menFuyin) status.push('门伏吟');
    if (g === maXingGong) status.push('马星');
    if (g === zhiFuGong) status.push('值符');
    md += `| ${g} | ${shenMap[g]||''} | ${tianPan[g]||''} | ${xingMap[g]||''} | ${menMap[g]||''}门 | ${diPan[g]||''} | ${status.join('、')||'—'} |\n`;
  }
  md += `\n`;

  md += `## 四害与格局\n\n`;
  let hasSiHai = false;
  for (let g=1; g<=9; g++) {
    if (g===5) continue;
    const s = siHai[g];
    if (!s) continue;
    let badges = [];
    if (s.both) badges.push('入墓+击刑');
    else { if (s.rumu) badges.push('入墓'); if (s.jixing) badges.push('击刑'); }
    if (s.menpo) badges.push('门迫');
    if (getXunKong(g, xunShou.zhiStart)) badges.push('空亡');
    if (s.ganFuyin) badges.push('干伏吟');
    if (s.xingFuyin) badges.push('星伏吟');
    if (s.menFuyin) badges.push('门伏吟');
    if (badges.length) { md += `- ${g}宫：${badges.join('、')}\n`; hasSiHai = true; }
  }
  if (!hasSiHai) md += '本局无明显四害，格局较清\n';
  md += `\n`;

  md += `## 占断摘要\n\n`;
  if (isFuYin) {
    md += `> ⚠️ 伏吟局：${fuYin.gan.length?'干伏吟':''}${fuYin.xing.length?'星伏吟':''}${fuYin.men.length?'门伏吟':''} — 主迟滞，利静不利动\n\n`;
  }
  if (maXingGong) {
    md += `- 马星在${maXingGong}宫，主奔波、变动、远行\n`;
  }
  md += `\n`;
  md += `---\n*排盘时间：${dateFmt} ${timeFmt}*\n`;
  return md;
}

function saveObsidian(mode) {
  const md = generateMarkdown();
  const d = window._panData;
  const dateFmt = d ? `${d.date.getFullYear()}-${String(d.date.getMonth()+1).padStart(2,'0')}-${String(d.date.getDate()).padStart(2,'0')}` : '排盘';
  const filename = `奇门排盘-${dateFmt}.md`;

  if (mode === 'download') {
    const blob = new Blob([md], {type:'text/markdown;charset=utf-8'});
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    URL.revokeObjectURL(a.href);
  } else if (mode === 'image') {
    drawQimenImage(dateFmt);
  } else if (mode === 'uri') {
    const encoded = encodeURIComponent(md);
    if (encoded.length > 3000) {
      alert('内容较长，Obsidian URI 可能截断。建议先「复制 Markdown」，然后在 Obsidian 中粘贴。');
      navigator.clipboard.writeText(md).then(() => console.log('已复制'));
      return;
    }
    window.open(`obsidian://new?vault=&file=${encodeURIComponent(filename)}&content=${encoded}`, '_blank');
  } else if (mode === 'clipboard') {
    navigator.clipboard.writeText(md).then(() => alert('Markdown 已复制到剪贴板')).catch(() => {
      const ta = document.createElement('textarea'); ta.value = md; document.body.appendChild(ta); ta.select(); document.execCommand('copy'); document.body.removeChild(ta); alert('Markdown 已复制到剪贴板');
    });
  }
}

// ========== Canvas 绘制九宫格图片 ==========
function drawQimenImage(dateFmt) {
  const d = window._panData;
  if (!d) { alert('请先排盘'); return; }
  const { date, hour, minute, yearStr, monthStr, dayStr, hourStr, lunar, jieQi, isYang, dunStr, juShu, sanYuan, xunShou, xunKongZhi, zhiFuGong, maXingGong, isFuYin, fuYin, siHai, diPan, tianPan, xingMap, menMap, shenMap, yueZhiIdx, hGZ } = d;
  const timeFmt = `${String(hour).padStart(2,'0')}:${String(minute).padStart(2,'0')}`;

  const canvas = document.createElement('canvas');
  const W = 600;
  const GW = 180, GH = 180, M = 20, GAP = 4;

  // 计算各部分高度
  const titleH = 70;      // 标题 + 四柱
  const infoH = 55;       // 信息标签行
  const gridH = 3 * GH + 2 * GAP + 20; // 九宫格 + 标题
  const readingH = 200;   // 占断摘要
  const detailH = 280;    // 排盘详情
  const footerH = 30;     // 底部
  const H = titleH + infoH + gridH + readingH + detailH + footerH + M * 2;

  canvas.width = W; canvas.height = H;
  const ctx = canvas.getContext('2d');
  let y = 0;

  // ========== 背景 ==========
  ctx.fillStyle = '#f5f0e8'; ctx.fillRect(0, 0, W, H);

  // ========== 标题区 ==========
  y = 15;
  ctx.fillStyle = '#4a3c2a'; ctx.font = 'bold 20px "Microsoft YaHei", sans-serif'; ctx.textAlign = 'center';
  ctx.fillText(`奇门遁甲排盘`, W/2, y + 20);
  ctx.font = '12px "Microsoft YaHei", sans-serif'; ctx.fillStyle = '#8b7d6b';
  ctx.fillText(`公历：${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日 ${timeFmt}  |  ${dunStr}${juShu}局 · ${sanYuan}`, W/2, y + 42);
  ctx.fillText(`农历：${lunar.ganZhi}年 ${lunar.monthStr}${lunar.dayStr}  |  四柱：${yearStr} ${monthStr} ${dayStr} ${hourStr}`, W/2, y + 58);

  // ========== 信息标签行 ==========
  y = titleH;
  const tags = [
    {label:'选局', value:`${dunStr}${juShu}局`},
    {label:'旬首', value:`甲${DI_ZHI[xunShou.zhiStart]}${xunShou.yi}`},
    {label:'值符', value:xingMap[zhiFuGong]||''},
    {label:'值使', value:(menMap[zhiFuGong]||'')+'门'},
    {label:'旬空', value:xunKongZhi},
    {label:'马星', value:`${DI_ZHI[hGZ.zhiIdx]}马在${maXingGong}宫`},
  ];
  if (isFuYin) tags.push({label:'格局', value:`${fuYin.gan.length?'干伏':''}${fuYin.xing.length?'星伏':''}${fuYin.men.length?'门伏':''}`});
  tags.push({label:'局式', value:'转盘-拆补-寄坤二宫'});

  const tagW = Math.floor((W - M*2 - (tags.length-1)*6) / tags.length);
  let tx = M;
  for (let t of tags) {
    // 标签背景
    ctx.fillStyle = '#fff'; ctx.fillRect(tx, y, tagW, 45);
    ctx.strokeStyle = '#e0d5c5'; ctx.lineWidth = 1;
    ctx.strokeRect(tx, y, tagW, 45);
    // 标签文字
    ctx.fillStyle = '#8b7d6b'; ctx.font = '10px "Microsoft YaHei", sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(t.label, tx + tagW/2, y + 16);
    ctx.fillStyle = '#4a3c2a'; ctx.font = 'bold 11px "Microsoft YaHei", sans-serif';
    ctx.fillText(t.value, tx + tagW/2, y + 35);
    tx += tagW + 6;
  }

  // ========== 九宫格标题 ==========
  y = titleH + infoH + 10;
  ctx.fillStyle = '#a08050'; ctx.font = 'bold 14px "Microsoft YaHei", sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('九宫格', M, y);

  // ========== 九宫格 ==========
  y = titleH + infoH + 25;
  const pos = {4:[0,0], 9:[1,0], 2:[2,0], 3:[0,1], 5:[1,1], 7:[2,1], 8:[0,2], 1:[1,2], 6:[2,2]};
  const gongList = [4,9,2,3,5,7,8,1,6];

  for (let g of gongList) {
    const [cx, cy] = pos[g];
    const gx = M + cx * (GW + GAP), gy = y + cy * (GH + GAP);

    // 宫格背景
    ctx.fillStyle = '#fff'; ctx.fillRect(gx+1, gy+1, GW-2, GH-2);

    // 边框
    ctx.strokeStyle = '#e0d5c5'; ctx.lineWidth = 1;
    ctx.strokeRect(gx, gy, GW, GH);

    if (g === 5) {
      ctx.fillStyle = '#a08050'; ctx.font = 'bold 28px "Microsoft YaHei", sans-serif'; ctx.textAlign = 'center';
      ctx.fillText('5', gx + GW/2, gy + GH/2 - 5);
      ctx.fillStyle = '#8b7d6b'; ctx.font = '13px "Microsoft YaHei", sans-serif';
      ctx.fillText('中宫', gx + GW/2, gy + GH/2 + 20);
      ctx.fillText(`${diPan[5]||'戊'}寄坤二`, gx + GW/2, gy + GH/2 + 40);
      continue;
    }

    const s = siHai[g] || {};
    const isZhiFu = g === zhiFuGong;
    const isMaXing = g === maXingGong;
    const isXunKong = getXunKong(g, xunShou.zhiStart);

    // 高亮边框（值符宫）
    if (isZhiFu) {
      ctx.strokeStyle = '#c0392b'; ctx.lineWidth = 3;
      ctx.strokeRect(gx+1, gy+1, GW-2, GH-2);
    }
    // 伏吟背景色
    else if (s.ganFuyin || s.xingFuyin || s.menFuyin) {
      ctx.fillStyle = '#fff8f0'; ctx.fillRect(gx+1, gy+1, GW-2, GH-2);
    }

    // 宫号（左上角）
    ctx.fillStyle = '#a08050'; ctx.font = 'bold 14px "Microsoft YaHei", sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(String(g), gx + 8, gy + 20);

    // 八神（顶部居中）
    ctx.fillStyle = '#5a3c20'; ctx.font = 'bold 14px "Microsoft YaHei", sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(shenMap[g] || '', gx + GW/2, gy + 20);

    // 天盘干（右上）
    ctx.fillStyle = '#c0392b'; ctx.font = 'bold 24px "Microsoft YaHei", sans-serif'; ctx.textAlign = 'right';
    ctx.fillText(tianPan[g] || '', gx + GW - 10, gy + 50);

    // 地盘干（左上）
    ctx.fillStyle = '#2980b9'; ctx.font = 'bold 16px "Microsoft YaHei", sans-serif'; ctx.textAlign = 'left';
    ctx.fillText(diPan[g] || '', gx + 10, gy + 50);

    // 九星（中间）
    ctx.fillStyle = '#e67e22'; ctx.font = 'bold 13px "Microsoft YaHei", sans-serif'; ctx.textAlign = 'center';
    ctx.fillText(xingMap[g] || '', gx + GW/2, gy + GH/2 + 8);

    // 八门（底部）
    ctx.fillStyle = '#27ae60'; ctx.font = 'bold 13px "Microsoft YaHei", sans-serif'; ctx.textAlign = 'center';
    ctx.fillText((menMap[g] || '') + '门', gx + GW/2, gy + GH - 15);

    // 标记（右上角小标记）
    let marks = [];
    if (s.both) marks.push('墓刑');
    else { if (s.rumu) marks.push('墓'); if (s.jixing) marks.push('刑'); }
    if (s.menpo) marks.push('迫');
    if (isXunKong) marks.push('空');
    if (s.ganFuyin) marks.push('干伏');
    if (s.xingFuyin) marks.push('星伏');
    if (s.menFuyin) marks.push('门伏');
    if (isMaXing) marks.push('马');
    if (isZhiFu) marks.push('符');

    if (marks.length) {
      ctx.fillStyle = '#8e44ad'; ctx.font = '10px "Microsoft YaHei", sans-serif'; ctx.textAlign = 'right';
      ctx.fillText(marks.join(' '), gx + GW - 8, gy + 35);
    }
  }

  // ========== 占断摘要 ==========
  y = titleH + infoH + gridH + 35;
  ctx.fillStyle = '#a08050'; ctx.font = 'bold 14px "Microsoft YaHei", sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('占断摘要', M, y);
  ctx.fillStyle = '#e0d5c5'; ctx.fillRect(M, y + 5, W - M*2, 1); // 分隔线

  y += 25;
  ctx.fillStyle = '#4a3c2a'; ctx.font = '13px "Microsoft YaHei", sans-serif'; ctx.textAlign = 'left';

  if (isFuYin) {
    ctx.fillStyle = '#c0392b'; ctx.font = 'bold 13px "Microsoft YaHei", sans-serif';
    ctx.fillText(`⚠️ 伏吟局：${fuYin.gan.length?'干伏吟':''}${fuYin.xing.length?'星伏吟':''}${fuYin.men.length?'门伏吟':''} — 主迟滞，利静不利动`, M, y);
    y += 22;
  }

  // 四害列表
  let hasSiHai = false;
  for (let g=1; g<=9; g++) {
    if (g===5) continue;
    const s = siHai[g];
    if (!s) continue;
    let badges = [];
    if (s.both) badges.push('入墓+击刑');
    else { if (s.rumu) badges.push('入墓'); if (s.jixing) badges.push('击刑'); }
    if (s.menpo) badges.push('门迫');
    if (getXunKong(g, xunShou.zhiStart)) badges.push('空亡');
    if (s.ganFuyin) badges.push('干伏吟');
    if (s.xingFuyin) badges.push('星伏吟');
    if (s.menFuyin) badges.push('门伏吟');
    if (badges.length) {
      ctx.fillStyle = '#4a3c2a'; ctx.font = '13px "Microsoft YaHei", sans-serif';
      ctx.fillText(`${g}宫：${badges.join('、')}`, M, y);
      y += 20;
      hasSiHai = true;
    }
  }
  if (!hasSiHai) {
    ctx.fillStyle = '#27ae60'; ctx.font = 'bold 13px "Microsoft YaHei", sans-serif';
    ctx.fillText('✓ 本局无明显四害，格局较清', M, y);
    y += 20;
  }

  if (maXingGong) {
    ctx.fillStyle = '#4a3c2a'; ctx.font = '13px "Microsoft YaHei", sans-serif';
    ctx.fillText(`马星在${maXingGong}宫，主奔波、变动、远行`, M, y);
    y += 20;
  }

  // ========== 排盘详情 ==========
  y += 10;
  ctx.fillStyle = '#a08050'; ctx.font = 'bold 14px "Microsoft YaHei", sans-serif'; ctx.textAlign = 'left';
  ctx.fillText('排盘详情', M, y);
  ctx.fillStyle = '#e0d5c5'; ctx.fillRect(M, y + 5, W - M*2, 1);

  y += 25;
  ctx.fillStyle = '#4a3c2a'; ctx.font = '12px "Microsoft YaHei", sans-serif';
  const details = [
    `公历：${date.getFullYear()}年${date.getMonth()+1}月${date.getDate()}日 ${timeFmt}`,
    `农历：${lunar.ganZhi}年 ${lunar.monthStr}${lunar.dayStr}`,
    `四柱：${yearStr} ${monthStr} ${dayStr} ${hourStr}`,
    `节气：${jieQi.name}（${isYang?'阳遁':'阴遁'}）`,
    `用局：${dunStr}${juShu}局 · ${sanYuan}`,
    `旬首：甲${DI_ZHI[xunShou.zhiStart]}（${xunShou.yi}）`,
    `旬空：${xunKongZhi}`,
    `值符：${xingMap[zhiFuGong]||''}（落${zhiFuGong}宫）`,
    `值使：${menMap[zhiFuGong]||''}门（落${zhiFuGong}宫）`,
    `马星：${DI_ZHI[hGZ.zhiIdx]}马在${maXingGong}宫`,
  ];
  if (isFuYin) {
    details.push(`伏吟：${fuYin.gan.length?'干伏吟('+fuYin.gan.join(',')+'宫) ':''}${fuYin.xing.length?'星伏吟('+fuYin.xing.join(',')+'宫) ':''}${fuYin.men.length?'门伏吟('+fuYin.men.join(',')+'宫)':''}`);
  }
  for (let line of details) {
    ctx.fillText(line, M, y);
    y += 20;
  }

  // ========== 底部 ==========
  y += 10;
  ctx.fillStyle = '#999'; ctx.font = '10px "Microsoft YaHei", sans-serif'; ctx.textAlign = 'center';
  ctx.fillText('排盘内容仅供娱乐，请客观科学看待，抵制封建迷信', W/2, y);

  // 下载
  const link = document.createElement('a');
  link.download = `奇门排盘-${dateFmt}.png`;
  link.href = canvas.toDataURL('image/png');
  link.click();
}
</script>
</body>
</html>
